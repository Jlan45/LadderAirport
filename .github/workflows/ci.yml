name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: auto
  CGO_ENABLED: "0"
  AGENT_TAGS: with_quic,with_utls
  SINGBOX_VERSION: "1.12.22"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            pkg/go.sum
            panel/go.sum
            agent/go.sum
            proto/go.sum

      - name: Test pkg
        run: cd pkg && go test ./...

      - name: Test panel
        run: cd panel && go test ./...

      - name: Test agent
        run: cd agent && go test -tags "${AGENT_TAGS}" ./... -timeout 120s

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            pkg/go.sum
            panel/go.sum
            agent/go.sum
            proto/go.sum

      - name: Resolve version
        id: ver
        run: |
          VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo 0.0.0-ci)"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "built_at=${BUILT}" >> "$GITHUB_OUTPUT"

      - name: Build panel
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
          GIT_COMMIT: ${{ steps.ver.outputs.commit }}
          BUILD_TIME: ${{ steps.ver.outputs.built_at }}
        run: |
          mkdir -p dist
          PANEL_LDFLAGS="-s -w"
          PANEL_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.Version=${VERSION}"
          PANEL_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.Commit=${GIT_COMMIT}"
          PANEL_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.BuiltAt=${BUILD_TIME}"
          PANEL_LDFLAGS+=" -X github.com/ladderairport/agent/internal/version.Version=${VERSION}"
          PANEL_LDFLAGS+=" -X github.com/ladderairport/agent/internal/version.Commit=${GIT_COMMIT}"
          PANEL_LDFLAGS+=" -X github.com/ladderairport/agent/internal/version.BuiltAt=${BUILD_TIME}"
          cd panel
          go build -trimpath -ldflags="${PANEL_LDFLAGS}" -o ../dist/panel-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/panel

      - name: Build ladder-agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
          GIT_COMMIT: ${{ steps.ver.outputs.commit }}
          BUILD_TIME: ${{ steps.ver.outputs.built_at }}
        run: |
          AGENT_LDFLAGS="-X github.com/sagernet/sing-box/constant.Version=${SINGBOX_VERSION}"
          AGENT_LDFLAGS+=" -X github.com/ladderairport/agent/internal/version.Version=${VERSION}"
          AGENT_LDFLAGS+=" -X github.com/ladderairport/agent/internal/version.Commit=${GIT_COMMIT}"
          AGENT_LDFLAGS+=" -X github.com/ladderairport/agent/internal/version.BuiltAt=${BUILD_TIME}"
          AGENT_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.Version=${VERSION}"
          AGENT_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.Commit=${GIT_COMMIT}"
          AGENT_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.BuiltAt=${BUILD_TIME}"
          cd agent
          go build -trimpath -tags "${AGENT_TAGS}" \
            -ldflags="-s -w ${AGENT_LDFLAGS}" \
            -o ../dist/ladder-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ladder-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  # Optional frontend check when web/ changes (panel embeds committed dist)
  web:
    name: Web build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

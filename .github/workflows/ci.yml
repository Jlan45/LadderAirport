name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: auto
  CGO_ENABLED: "0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            pkg/go.sum
            panel/go.sum
            agent/go.sum
            proto/go.sum

      - name: Test pkg
        run: cd pkg && go test ./...

      - name: Test panel
        run: cd panel && go test ./...

      - name: Test agent
        run: cd agent && go test ./... -timeout 120s

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            pkg/go.sum
            panel/go.sum
            agent/go.sum
            proto/go.sum

      - name: Build panel
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          cd panel
          go build -trimpath -ldflags="-s -w" -o ../dist/panel-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/panel

      - name: Build ladder-agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd agent
          go build -trimpath -ldflags="-s -w" -o ../dist/ladder-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ladder-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  # Optional frontend check when web/ changes (panel embeds committed dist)
  web:
    name: Web build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

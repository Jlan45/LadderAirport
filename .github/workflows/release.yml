name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GOTOOLCHAIN: auto
  CGO_ENABLED: "0"
  AGENT_TAGS: with_quic,with_utls
  SINGBOX_VERSION: "1.12.22"

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache-dependency-path: |
            pkg/go.sum
            panel/go.sum
            agent/go.sum
            proto/go.sum

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo 0.0.0-dev)"
          fi
          COMMIT="$(git rev-parse --short HEAD)"
          BUILT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "built_at=${BUILT}" >> "$GITHUB_OUTPUT"
          echo "Building VERSION=${VERSION} COMMIT=${COMMIT}"

      - name: Build all targets
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GIT_COMMIT: ${{ steps.ver.outputs.commit }}
          BUILD_TIME: ${{ steps.ver.outputs.built_at }}
        run: |
          mkdir -p dist
          VERSION_LDFLAGS="-X github.com/ladderairport/agent/internal/version.Version=${VERSION}"
          VERSION_LDFLAGS+=" -X github.com/ladderairport/agent/internal/version.Commit=${GIT_COMMIT}"
          VERSION_LDFLAGS+=" -X github.com/ladderairport/agent/internal/version.BuiltAt=${BUILD_TIME}"
          VERSION_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.Version=${VERSION}"
          VERSION_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.Commit=${GIT_COMMIT}"
          VERSION_LDFLAGS+=" -X github.com/ladderairport/panel/internal/version.BuiltAt=${BUILD_TIME}"
          AGENT_LDFLAGS="-X github.com/sagernet/sing-box/constant.Version=${SINGBOX_VERSION} ${VERSION_LDFLAGS}"
          PANEL_LDFLAGS="-s -w ${VERSION_LDFLAGS}"

          for pair in linux/amd64 linux/arm64; do
            GOOS="${pair%/*}"
            GOARCH="${pair#*/}"
            echo "==> $GOOS/$GOARCH version=${VERSION}"
            (cd panel && GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags="${PANEL_LDFLAGS}" \
              -o ../dist/panel-${GOOS}-${GOARCH} ./cmd/panel)
            (cd agent && GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -tags "${AGENT_TAGS}" \
              -ldflags="-s -w ${AGENT_LDFLAGS}" \
              -o ../dist/ladder-agent-${GOOS}-${GOARCH} ./cmd/ladder-agent)
          done
          cd dist
          sha256sum * > SHA256SUMS.txt
          ls -la
          # smoke: ensure version string is in the linux/amd64 agent binary
          if command -v strings >/dev/null; then
            strings ladder-agent-linux-amd64 | grep -F "${VERSION}" | head -3 || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/panel-linux-amd64
            dist/panel-linux-arm64
            dist/ladder-agent-linux-amd64
            dist/ladder-agent-linux-arm64
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

syntax = "proto3";

package agent.v1;

option go_package = "github.com/ladderairport/proto/gen/go/agent/v1;agentv1";

service AgentControl {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc ApplyConfig(ApplyConfigRequest) returns (ApplyConfigResponse);
  rpc Start(StartRequest) returns (StartResponse);
  rpc Stop(StopRequest) returns (StopResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
  rpc StreamLogs(StreamLogsRequest) returns (stream LogLine);
  rpc ListInterfaces(ListInterfacesRequest) returns (ListInterfacesResponse);
  // UpgradeAgent downloads a release binary to the upgrade staging dir so a
  // root-owned systemd path unit can replace /usr/local/bin/ladder-agent and restart.
  // The RPC returns after staging (before restart). Panel should re-probe for the new version.
  rpc UpgradeAgent(UpgradeAgentRequest) returns (UpgradeAgentResponse);
}

message PingRequest {}
message PingResponse {
  string agent_version = 1;
  string singbox_version = 2;
}

message ApplyConfigRequest {
  string config_json = 1;
  string config_hash = 2;
  bool replace = 3;
}
message ApplyConfigResponse {
  bool ok = 1;
  string message = 2;
  string applied_hash = 3;
}

message StartRequest {}
message StartResponse {
  bool ok = 1;
  string message = 2;
}
message StopRequest {}
message StopResponse {
  bool ok = 1;
  string message = 2;
}

message GetStatusRequest {}
message GetStatusResponse {
  string state = 1; // running | stopped | error
  string config_hash = 2;
  int64 started_at_unix = 3;
  string last_error = 4;
}

message GetMetricsRequest {}
message GetMetricsResponse {
  int64 connections = 1;
  int64 uplink_bytes = 2;
  int64 downlink_bytes = 3;
  double cpu_percent = 4;
  int64 memory_rss_bytes = 5;
}

message StreamLogsRequest {
  string level = 1; // optional filter: debug|info|warn|error
  int32 tail = 2;   // lines from ring buffer before live
}
message LogLine {
  int64 ts_unix_ms = 1;
  string level = 2;
  string message = 3;
}

message ListInterfacesRequest {}

message NetworkInterface {
  string name = 1;
  repeated string addresses = 2;
  bool up = 3;
  bool loopback = 4;
  int32 mtu = 5;
  string hardware_addr = 6;
}

message ListInterfacesResponse {
  repeated NetworkInterface interfaces = 1;
}

message UpgradeAgentRequest {
  // Target release tag, e.g. "v0.7.1". Empty or "latest" resolves GitHub latest.
  string version = 1;
  // Optional GitHub owner/repo override (default Jlan45/LadderAirport).
  string repo = 2;
  // Optional direct download URL for the linux binary (skips GitHub resolution).
  string download_url = 3;
  // Optional expected SHA-256 hex of the binary.
  string sha256 = 4;
}

message UpgradeAgentResponse {
  bool ok = 1;
  string message = 2;
  // Resolved version/tag when known.
  string version = 3;
  // Absolute path of the staged binary (before helper applies it).
  string staged_path = 4;
  // Previous agent version string reported by this process.
  string previous_version = 5;
}

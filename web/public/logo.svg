<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan to Violet neon gradient -->
    <linearGradient id="cyan-violet" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Dark Rounded Squircle Base -->
  <rect width="504" height="504" x="4" y="4" rx="124" fill="#09090b" stroke="#1d1d20" stroke-width="8"/>

  <!-- Ladder / Runway -->
  <g>
    <!-- Left Rail -->
    <line x1="140" y1="380" x2="240" y2="280" stroke="url(#cyan-violet)" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <!-- Right Rail -->
    <line x1="196" y1="436" x2="296" y2="336" stroke="url(#cyan-violet)" stroke-width="8" stroke-linecap="round" opacity="0.4"/>

    <!-- Ladder Rungs -->
    <line x1="154" y1="366" x2="210" y2="422" stroke="url(#cyan-violet)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="174" y1="346" x2="230" y2="402" stroke="url(#cyan-violet)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="194" y1="326" x2="250" y2="382" stroke="url(#cyan-violet)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="214" y1="306" x2="270" y2="362" stroke="url(#cyan-violet)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Speed / Exhaust Trails -->
  <g>
    <!-- Left Exhaust -->
    <line x1="195" y1="270" x2="145" y2="320" stroke="url(#cyan-violet)" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <!-- Central Exhaust -->
    <line x1="215" y1="290" x2="165" y2="340" stroke="url(#cyan-violet)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <!-- Right Exhaust -->
    <line x1="242" y1="317" x2="192" y2="367" stroke="url(#cyan-violet)" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Airplane Model -->
  <g filter="url(#glow)">
    <!-- Wings -->
    <path d="M 295,217 L 190,160 L 250,262 L 352,322 Z" fill="#0c0c0e" fill-opacity="0.85" stroke="url(#cyan-violet)" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Tail / Stabilizers -->
    <path d="M 235,277 L 200,255 L 220,292 L 257,312 Z" fill="#09090b" fill-opacity="0.9" stroke="url(#cyan-violet)" stroke-width="6" stroke-linejoin="round"/>

    <!-- Fuselage -->
    <path d="M 370,142 Q 310,210 220,292 Q 285,227 370,142 Z" fill="url(#cyan-violet)" fill-opacity="0.25" stroke="url(#cyan-violet)" stroke-width="8" stroke-linejoin="round"/>
  </g>
</svg>
